syntax = "proto3";

package brokerage.common.v1;

option go_package = "github.com/hxiaodon/ai-broker/api/common/v1;commonv1";

// PageRequest 分页请求参数
message PageRequest {
  int32 page      = 1; // 页码，从 1 开始
  int32 page_size = 2; // 每页条数，最大 100
}

// PageResponse 分页响应元数据
message PageResponse {
  int32 page       = 1;
  int32 page_size  = 2;
  int32 total      = 3; // 总条数
  bool  has_next   = 4;
}

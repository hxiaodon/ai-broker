# Mobile Domain — Feature Implementation Dashboard
#
# 更新规则：
#   - 每当模块状态变更（pending → in_progress → review → shipped）时更新
#   - phase1_tasks 字段随 tracker 实际进度更新
#   - 新模块开始前必须先创建对应的 tracker 文件
#
# 状态定义：
#   pending     — 尚未开始，tracker 待创建
#   in_progress — 正在实现，tracker 已创建
#   review      — 实现完成，等待 security-engineer + code-reviewer 审核
#   shipped     — 审核通过，合并至 main


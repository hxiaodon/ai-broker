  - id: auth
    name: 认证模块
    status: review
    phase1_tasks: "17/17"
    prd: mobile/docs/prd/01-auth.md
    tracker: mobile/docs/specs/auth.tracker.md
    hifi: mobile/prototypes/01-auth/
    contracts:
      - docs/contracts/ams-to-mobile.md  # § Auth
    notes: >
      security-engineer + code-reviewer 审核完成（2026-04-29）：
      5 Critical + 7 Major 已全部修复。修复要点：
      C1 SSL pin placeholder 加 assert 阻断 release 构建、
      C2 biometric_login/setup/device 三个 screen 替换 raw LocalAuthentication → localAuthServiceProvider（强制 biometricOnly:true）、
      C3 设备注销 stub 签名加 kReleaseMode guard、
      C4 AuthInterceptor Completer 竞态修复（null 移至 complete 前）、
      C5 refresh token JWT 格式校验移除（opaque token 合约）、
      M1 accountStatus 从 JWT claims 提取（不再硬编码 ACTIVE）、
      M2 OTP lockout 持久化到 secure storage（重启不可绕过）、
      M3 refresh 请求加 X-Device-ID、M4 confirmRevokeAll 合并单次生物识别、
      M5 日志手机号脱敏、M6 screen 改用 use-case provider。
      API 集成测试修复：otp→otp_code 字段名、400→401 状态码、移除不存在的 success 字段断言。
      待合并至 main。


name: trading_app
description: US/HK Stock Brokerage Trading App — Flutter mobile client.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.0

  # Network
  dio: ^5.7.0
  web_socket_channel: ^3.0.3
  protobuf: ^6.0.0
  fixnum: ^1.1.0

  # Security storage
  flutter_secure_storage: ^10.0.0

  # Biometrics
  local_auth: ^3.0.1

  # Charts
  syncfusion_flutter_charts: ^33.1.46

  # Image
  image_picker: ^1.2.1
  image_cropper: ^12.1.1
  cached_network_image: ^3.4.1

  # PDF
  pdfx: ^2.9.2

  # WebView
  webview_flutter: ^4.10.0

  # Local database & cache
  drift: ^2.31.0
  shared_preferences: ^2.5.5
  hive_ce: ^2.9.0

  # Routing
  go_router: ^14.8.1

  # Device & platform info
  device_info_plus: ^12.4.0
  package_info_plus: ^9.0.1
  permission_handler: ^12.0.1

  # Security & protection
  screen_protector: ^1.5.1
  crypto: ^3.0.0

  # Utilities
  uuid: ^4.5.3
  intl: ^0.20.2
  decimal: ^3.2.1
  logger: ^2.7.0
  connectivity_plus: ^7.1.0
  rxdart: ^0.28.0
  timeago: ^3.7.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0

  # SMS OTP
  smart_auth: ^3.2.0

  # Swipe confirm
  slide_to_confirm: ^1.1.0
  path_provider: ^2.1.5
  path: ^1.9.1

  # Assets rendering
  flutter_svg: ^2.0.17
  rive: ^0.13.20

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  riverpod: ^3.0.0  # direct dep for test imports (riverpod/misc.dart)

  # Code generation
  # analyzer version ceiling imposed by riverpod_generator 4.x (requires ^9.0.0):
  #   - json_serializable capped at ^6.12.0 (6.13+ needs analyzer >=10.0.0)
  #   - drift_dev capped at ^2.28.0 (2.32+ needs analyzer >=10.0.0)
  # Unblock all three when riverpod_generator adds support for analyzer 10+.
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  drift_dev: ^2.28.0
  freezed: ^3.2.5
  json_serializable: ^6.12.0

  # Testing
  mocktail: ^1.0.4
  fake_async: ^1.3.1

  # Linting
  flutter_lints: ^6.0.0
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
    - assets/icons/nav/
    - assets/icons/system/
    - assets/icons/kyc/
    - assets/icons/trading/
    - assets/icons/funding/
    - assets/icons/market/
    - assets/icons/account/
    - assets/illustrations/onboarding/
    - assets/illustrations/empty-states/
    - assets/illustrations/kyc-status/
    - assets/illustrations/result-states/
    - assets/motion/
    - assets/avatars/
    - assets/stock/

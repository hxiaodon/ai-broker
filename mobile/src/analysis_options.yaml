include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    # Generated files — never lint these
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    - "build/**"
    - ".dart_tool/**"
  errors:
    missing_return: error
    dead_code: warning
    # Treat strict analysis warnings as info during scaffolding phase
    strict_raw_type: info
    inference_failure_on_function_invocation: info
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    # Core financial safety rules
    avoid_print: true
    always_declare_return_types: true

    # Disabled for Phase 1 scaffolding — re-enable for Phase 2 features
    always_use_package_imports: false
    lines_longer_than_80_chars: false
    public_member_api_docs: false
    one_member_abstracts: false
    sort_pub_dependencies: false
    avoid_redundant_argument_values: false
    always_put_required_named_parameters_first: false
    directives_ordering: false
    omit_local_variable_types: false
    no_runtimetype_tostring: false
    avoid_catches_without_on_clauses: false
    comment_references: false

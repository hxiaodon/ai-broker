name: trading_app
description: US/HK Stock Brokerage Trading App — Flutter mobile client.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.21.0

  # Network
  dio: ^5.7.0
  web_socket_channel: ^3.0.3
  protobuf: ^3.1.0

  # Security storage
  flutter_secure_storage: ^10.0.0

  # Biometrics
  local_auth: ^3.0.1

  # Charts
  syncfusion_flutter_charts: ^32.2.9

  # Image
  image_picker: ^1.2.1
  image_cropper: ^11.0.0
  cached_network_image: ^3.4.1

  # PDF
  pdfx: ^2.9.2

  # WebView
  webview_flutter: ^4.10.0

  # Local database & cache
  drift: ^2.23.1
  shared_preferences: ^2.3.4
  hive_ce: ^2.9.0

  # Routing
  go_router: ^14.6.2

  # Device & platform info
  device_info_plus: ^12.3.0
  package_info_plus: ^8.1.3
  permission_handler: ^11.3.1

  # Security & protection
  screen_protector: ^1.5.1
  crypto: ^3.0.0

  # Utilities
  uuid: ^4.5.3
  intl: ^0.20.2
  decimal: ^3.2.1
  logger: ^2.5.0
  connectivity_plus: ^6.1.1
  rxdart: ^0.28.0
  timeago: ^3.7.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # SMS OTP
  smart_auth: ^3.2.0

  # Swipe confirm
  slide_to_confirm: ^1.1.0
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.1
  drift_dev: ^2.23.1
  freezed: ^2.5.7
  json_serializable: ^6.9.4

  # Testing
  mocktail: ^1.0.4

  # Linting
  flutter_lints: ^5.0.0
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>08-Settings-Profile — 个人资料</title>

  <link rel="stylesheet" href="../../_design-system/tokens.css">
  <link rel="stylesheet" href="../../_design-system/components.css">
  <link rel="stylesheet" href="../../_design-system/proto-base.css">

  <style>
    .profile-edit-header {
      padding: var(--space-6) var(--space-4);
      text-align: center;
      border-bottom: 1px solid var(--color-divider);
      margin-bottom: var(--space-4);
    }

    .avatar-upload {
      width: 80px;
      height: 80px;
      margin: 0 auto var(--space-3);
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-4xl);
      cursor: pointer;
      position: relative;
      transition: all var(--transition-fast);
    }

    .avatar-upload:hover {
      box-shadow: 0 4px 12px rgba(13, 101, 242, 0.3);
    }

    .avatar-upload-hint {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      margin-top: var(--space-2);
    }

    .form-section {
      background: var(--color-bg-surface);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .form-label {
      font-size: var(--text-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-2);
    }

    .form-input {
      width: 100%;
      padding: var(--space-3);
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-divider);
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      color: var(--color-text-primary);
      outline: none;
      margin-bottom: var(--space-3);
      transition: all var(--transition-fast);
    }

    .form-input:last-child {
      margin-bottom: 0;
    }

    .form-input:focus {
      border-color: var(--color-primary);
    }

    .form-input::placeholder {
      color: var(--color-text-tertiary);
    }

    .form-input[type="date"],
    .form-input[type="tel"] {
      font-family: var(--font-mono);
    }

    .form-hint {
      font-size: var(--text-xs);
      color: var(--color-text-tertiary);
      margin-top: var(--space-1);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .form-row .form-input {
      margin-bottom: 0;
    }

    .info-card {
      background: rgba(13, 197, 130, 0.1);
      border-left: 3px solid var(--color-gain);
      padding: var(--space-3);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-4);
    }

    .info-card-title {
      font-size: var(--text-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--color-gain);
      margin-bottom: var(--space-1);
    }

    .info-card-message {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      line-height: 1.5;
    }

    .verified-badge {
      display: inline-block;
      padding: 4px 8px;
      background: rgba(13, 197, 130, 0.15);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--color-gain);
    }

    .readonly-field {
      padding: var(--space-3);
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-divider);
      border-radius: var(--radius-md);
      color: var(--color-text-primary);
      margin-bottom: var(--space-3);
    }

    .tax-info-card {
      background: var(--color-bg-surface);
      border: 1px solid var(--color-divider);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .tax-info-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-3);
    }

    .tax-info-title {
      font-size: var(--text-base);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
    }

    .tax-status-badge {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(13, 197, 130, 0.15);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--color-gain);
    }

    .tax-status-badge.expiring {
      background: rgba(255, 193, 7, 0.15);
      color: #FFC107;
    }

    .tax-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-2) 0;
      border-bottom: 1px solid var(--color-divider);
    }

    .tax-info-row:last-child {
      border-bottom: none;
    }

    .tax-info-label {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }

    .tax-info-value {
      font-size: var(--text-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      font-family: var(--font-mono);
    }

    .tax-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
      margin-top: var(--space-3);
    }
  </style>
</head>
<body>

<div class="proto-nav">
  <strong>📱 08-Settings-Profile — 个人资料</strong><br>
  🔗 <a href="index.html">← 返回</a> | <a href="settings.html">设置</a>
</div>

<div class="phone">
  <div class="status-bar">
    <div class="status-bar-left"><span class="status-bar-time">9:41</span></div>
    <div class="status-bar-right"><span>●●●</span><span>WiFi</span><span>100%</span></div>
  </div>

  <div class="nav-bar">
    <div class="nav-bar-left">
      <div class="nav-bar-back" onclick="history.back()">‹</div>
    </div>
    <div class="nav-bar-center">
      <div class="nav-bar-title">个人资料</div>
    </div>
    <div class="nav-bar-right"></div>
  </div>

  <div class="screen">

    <!-- 头像编辑 -->
    <div class="profile-edit-header">
      <div class="avatar-upload">👤</div>
      <div class="avatar-upload-hint">点击编辑头像</div>
    </div>

    <!-- 基本信息 -->
    <div class="form-section">
      <div class="form-label">姓名</div>
      <input type="text" class="form-input" value="张三">

      <div class="form-label">邮箱 <span class="verified-badge">已验证</span></div>
      <div class="readonly-field">user@example.com</div>

      <div class="form-label">手机号</div>
      <input type="tel" class="form-input" value="138-1234-5678">
    </div>

    <!-- 身份信息 -->
    <div class="form-section">
      <div class="form-label">证件类型</div>
      <select class="form-input">
        <option>身份证</option>
        <option selected>驾驶证</option>
        <option>护照</option>
      </select>

      <div class="form-label">证件号码 <span class="verified-badge">已验证</span></div>
      <div class="readonly-field">110101199001011234</div>

      <div class="form-label">出生日期</div>
      <input type="date" class="form-input" value="1990-01-01">
    </div>

    <!-- 地址信息 -->
    <div class="form-section">
      <div class="form-label">国家/地区</div>
      <select class="form-input">
        <option selected>中国</option>
        <option>美国</option>
        <option>香港</option>
      </select>

      <div class="form-label">省份/州</div>
      <input type="text" class="form-input" value="北京市" placeholder="省份/州">

      <div class="form-label">城市</div>
      <input type="text" class="form-input" value="朝阳区" placeholder="城市">

      <div class="form-label">详细地址</div>
      <input type="text" class="form-input" value="xxx 街道 123 号" placeholder="街道和门牌号">
    </div>

    <!-- 职业信息 -->
    <div class="form-section">
      <div class="form-label">职业</div>
      <select class="form-input">
        <option>请选择</option>
        <option selected>软件工程师</option>
        <option>医生</option>
        <option>教师</option>
        <option>其他</option>
      </select>

      <div class="form-label">雇主名称</div>
      <input type="text" class="form-input" value="科技公司" placeholder="您的雇主">

      <div class="form-label">行业</div>
      <select class="form-input">
        <option>请选择</option>
        <option selected>IT/科技</option>
        <option>金融</option>
        <option>房地产</option>
        <option>其他</option>
      </select>
    </div>

    <!-- 税务信息 -->
    <div class="tax-info-card">
      <div class="tax-info-header">
        <div class="tax-info-title">W-8BEN 税务信息</div>
        <div class="tax-status-badge">有效</div>
      </div>

      <div class="tax-info-row">
        <div class="tax-info-label">表格类型</div>
        <div class="tax-info-value">W-8BEN</div>
      </div>

      <div class="tax-info-row">
        <div class="tax-info-label">状态</div>
        <div class="tax-info-value">已提交</div>
      </div>

      <div class="tax-info-row">
        <div class="tax-info-label">提交日期</div>
        <div class="tax-info-value">2025-10-15</div>
      </div>

      <div class="tax-info-row">
        <div class="tax-info-label">有效期</div>
        <div class="tax-info-value">2026-10-14</div>
      </div>

      <div class="tax-info-row">
        <div class="tax-info-label">预扣税率</div>
        <div class="tax-info-value">0%</div>
      </div>

      <div class="tax-actions">
        <button class="btn btn-secondary">查看详情</button>
        <button class="btn btn-ghost">更新信息</button>
      </div>
    </div>

    <!-- 保存按钮 -->
    <div style="padding: var(--space-4);">
      <button class="btn btn-primary" style="width: 100%;">保存修改</button>
      <button class="btn btn-ghost" style="width: 100%; margin-top: var(--space-2);" onclick="history.back()">取消</button>
    </div>

  </div>

  <div class="tab-bar">
    <div class="tab-item" onclick="goto('../../03-market/hifi/index.html')"><div class="tab-item-icon">📈</div><span>行情</span></div>
    <div class="tab-item" onclick="goto('../../04-trading/hifi/order-list.html')"><div class="tab-item-icon">📝</div><span>交易</span></div>
    <div class="tab-item" onclick="goto('../../06-portfolio/hifi/index.html')"><div class="tab-item-icon">💼</div><span>持仓</span></div>
    <div class="tab-item" onclick="goto('index.html')"><div class="tab-item-icon">⚙️</div><span>我的</span></div>
  </div>
</div>

<script src="../../_shared/proto-router.js"></script>

</body>
</html>

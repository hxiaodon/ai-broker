<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>搜索 - 券商交易</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .price-up { color: #10B981; }
        .price-down { color: #EF4444; }
    </style>
</head>
<body class="bg-white">
    <div class="max-w-md mx-auto min-h-screen bg-white">
        <!-- Header -->
        <div class="flex items-center px-4 py-3 border-b border-gray-200">
            <a id="backLink" href="market.html" class="mr-3">
                <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </a>
            <div class="flex-1 relative">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="搜索股票代码或名称"
                    class="w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
                    autofocus
                >
                <svg class="w-5 h-5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <button id="clearBtn" class="absolute right-3 top-1/2 -translate-y-1/2 hidden" onclick="clearSearch()">
                    <svg class="w-5 h-5 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Recent Searches -->
        <div id="recentSection" class="px-4 py-3">
            <div class="flex justify-between items-center mb-3">
                <div class="text-sm font-semibold text-gray-900">最近搜索</div>
                <button onclick="clearHistory()" class="text-xs text-blue-600">清空</button>
            </div>
            <div class="flex flex-wrap gap-2" id="recentList">
                <button class="px-3 py-1.5 bg-gray-100 rounded-full text-sm text-gray-700" onclick="searchStock('AAPL')">AAPL</button>
                <button class="px-3 py-1.5 bg-gray-100 rounded-full text-sm text-gray-700" onclick="searchStock('TSLA')">TSLA</button>
                <button class="px-3 py-1.5 bg-gray-100 rounded-full text-sm text-gray-700" onclick="searchStock('NVDA')">NVDA</button>
            </div>
        </div>

        <!-- Hot Searches -->
        <div id="hotSection" class="px-4 py-3 border-t border-gray-100">
            <div class="text-sm font-semibold text-gray-900 mb-3">热门搜索</div>
            <div class="space-y-2" id="hotList">
                <button class="flex items-center justify-between w-full py-2" onclick="searchStock('AAPL')">
                    <div class="flex items-center">
                        <span class="w-5 text-xs font-semibold text-red-600">1</span>
                        <span class="ml-3 font-medium text-gray-900">AAPL</span>
                        <span class="ml-2 text-sm text-gray-500">Apple Inc.</span>
                    </div>
                    <span class="text-sm price-up">+1.35%</span>
                </button>
                <button class="flex items-center justify-between w-full py-2" onclick="searchStock('NVDA')">
                    <div class="flex items-center">
                        <span class="w-5 text-xs font-semibold text-red-600">2</span>
                        <span class="ml-3 font-medium text-gray-900">NVDA</span>
                        <span class="ml-2 text-sm text-gray-500">NVIDIA</span>
                    </div>
                    <span class="text-sm price-up">+1.56%</span>
                </button>
                <button class="flex items-center justify-between w-full py-2" onclick="searchStock('TSLA')">
                    <div class="flex items-center">
                        <span class="w-5 text-xs font-semibold text-orange-600">3</span>
                        <span class="ml-3 font-medium text-gray-900">TSLA</span>
                        <span class="ml-2 text-sm text-gray-500">Tesla Inc.</span>
                    </div>
                    <span class="text-sm price-down">-1.29%</span>
                </button>
            </div>
        </div>

        <!-- Search Results -->
        <div id="resultsSection" class="hidden">
            <div class="px-4 py-2 text-xs text-gray-500" id="resultCount"></div>
            <div class="divide-y divide-gray-100" id="resultsList"></div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden px-4 py-12 text-center">
            <svg class="w-16 h-16 mx-auto text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <div class="mt-4 text-sm text-gray-500">未找到相关股票</div>
        </div>
    </div>

    <script>
        const allStocks = [
            { symbol: 'AAPL', name: 'Apple Inc.', nameCN: '苹果', price: 175.23, change: 1.35, up: true },
            { symbol: 'TSLA', name: 'Tesla Inc.', nameCN: '特斯拉', price: 245.67, change: -1.29, up: false },
            { symbol: 'MSFT', name: 'Microsoft', nameCN: '微软', price: 378.90, change: 1.37, up: true },
            { symbol: 'GOOGL', name: 'Alphabet', nameCN: '谷歌', price: 142.56, change: -1.31, up: false },
            { symbol: 'AMZN', name: 'Amazon', nameCN: '亚马逊', price: 178.34, change: 1.97, up: true },
            { symbol: 'NVDA', name: 'NVIDIA', nameCN: '英伟达', price: 823.45, change: 1.56, up: true },
            { symbol: 'META', name: 'Meta Platforms', nameCN: 'Meta', price: 485.32, change: 0.85, up: true },
            { symbol: 'BABA', name: 'Alibaba', nameCN: '阿里巴巴', price: 78.90, change: -0.45, up: false }
        ];

        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const recentSection = document.getElementById('recentSection');
        const hotSection = document.getElementById('hotSection');
        const resultsSection = document.getElementById('resultsSection');
        const emptyState = document.getElementById('emptyState');
        const resultsList = document.getElementById('resultsList');
        const resultCount = document.getElementById('resultCount');

        searchInput.addEventListener('input', function() {
            const query = this.value.trim();

            if (query.length > 0) {
                clearBtn.classList.remove('hidden');
                performSearch(query);
            } else {
                clearBtn.classList.add('hidden');
                showDefaultView();
            }
        });

        function performSearch(query) {
            const lowerQuery = query.toLowerCase();
            const results = allStocks.filter(stock =>
                stock.symbol.toLowerCase().includes(lowerQuery) ||
                stock.name.toLowerCase().includes(lowerQuery) ||
                stock.nameCN.includes(query) ||
                getPinyin(stock.nameCN).includes(lowerQuery)
            );

            recentSection.classList.add('hidden');
            hotSection.classList.add('hidden');
            emptyState.classList.add('hidden');

            if (results.length > 0) {
                resultsSection.classList.remove('hidden');
                resultCount.textContent = `找到 ${results.length} 个结果`;
                renderResults(results);
            } else {
                resultsSection.classList.add('hidden');
                emptyState.classList.remove('hidden');
            }
        }

        const isGuest = new URLSearchParams(window.location.search).get('guest') === '1';
        const guestParam = isGuest ? '&guest=1' : '';
        if (isGuest) document.getElementById('backLink').href = 'market.html?guest=1';

        function renderResults(results) {
            resultsList.innerHTML = results.map(stock => `
                <a href="stock-detail.html?symbol=${stock.symbol}${guestParam}" class="block px-4 py-3 hover:bg-gray-50">
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <div class="flex items-center">
                                <span class="font-semibold text-gray-900">${stock.symbol}</span>
                                <span class="ml-2 text-sm text-gray-500">${stock.name}</span>
                            </div>
                            <div class="text-xs text-gray-400 mt-1">${stock.nameCN}</div>
                        </div>
                        <div class="text-right">
                            <div class="font-semibold ${stock.up ? 'price-up' : 'price-down'}">
                                $${stock.price.toFixed(2)}
                            </div>
                            <div class="text-sm ${stock.up ? 'price-up' : 'price-down'}">
                                ${stock.change > 0 ? '+' : ''}${stock.change.toFixed(2)}%
                            </div>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        function showDefaultView() {
            recentSection.classList.remove('hidden');
            hotSection.classList.remove('hidden');
            resultsSection.classList.add('hidden');
            emptyState.classList.add('hidden');
        }

        function clearSearch() {
            searchInput.value = '';
            clearBtn.classList.add('hidden');
            showDefaultView();
            searchInput.focus();
        }

        function searchStock(symbol) {
            searchInput.value = symbol;
            clearBtn.classList.remove('hidden');
            performSearch(symbol);
        }

        function clearHistory() {
            if (confirm('确认清空搜索历史？')) {
                document.getElementById('recentList').innerHTML = '<div class="text-sm text-gray-400">暂无搜索历史</div>';
            }
        }

        // Simple pinyin mapping (simplified)
        function getPinyin(text) {
            const pinyinMap = {
                '苹果': 'pingguo',
                '特斯拉': 'tesila',
                '微软': 'weiruan',
                '谷歌': 'guge',
                '亚马逊': 'yamaxun',
                '英伟达': 'yingweida',
                '阿里巴巴': 'alibaba'
            };
            return pinyinMap[text] || '';
        }
    </script>
</body>
</html>

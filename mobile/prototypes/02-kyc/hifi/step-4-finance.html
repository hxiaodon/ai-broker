<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>02-KYC — Step 4 财务状况</title>

  <link rel="stylesheet" href="../../_design-system/tokens.css">
  <link rel="stylesheet" href="../../_design-system/components.css">
  <link rel="stylesheet" href="../../_design-system/proto-base.css">

  <style>
    .kyc-header {
      padding: var(--space-4) var(--space-4);
      border-bottom: 1px solid var(--color-divider);
      background: var(--color-bg-surface);
    }

    .kyc-progress {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-3);
    }

    .kyc-progress-bar {
      flex: 1;
      height: 6px;
      background: var(--color-bg-elevated);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .kyc-progress-fill {
      height: 100%;
      background: var(--color-primary);
      border-radius: var(--radius-full);
    }

    .kyc-progress-text {
      font-size: var(--text-xs);
      font-weight: var(--font-weight-bold);
      color: var(--color-primary);
      min-width: 50px;
      text-align: right;
    }

    .kyc-title {
      font-size: var(--text-lg);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-1);
    }

    .kyc-subtitle {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }

    .form-section {
      background: var(--color-bg-surface);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .form-label {
      font-size: var(--text-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-2);
    }

    .form-input {
      width: 100%;
      padding: var(--space-3);
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-divider);
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      color: var(--color-text-primary);
      outline: none;
      margin-bottom: var(--space-3);
      transition: all var(--transition-fast);
    }

    .form-input:last-child {
      margin-bottom: 0;
    }

    .form-input:focus {
      border-color: var(--color-primary);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) 0;
      margin-bottom: var(--space-2);
    }

    .checkbox-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .checkbox-row label {
      flex: 1;
      font-size: var(--text-sm);
      color: var(--color-text-primary);
      cursor: pointer;
    }

    .info-card {
      background: rgba(13, 101, 242, 0.1);
      border-left: 3px solid var(--color-primary);
      padding: var(--space-3);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="proto-nav">
  <strong>📱 02-KYC — Step 4 财务状况</strong><br>
  🔗 <a href="step-3-address.html">Step 3 地址</a> | <a href="step-5-investment.html">Step 5</a>
</div>

<div class="phone">
  <div class="status-bar">
    <div class="status-bar-left"><span class="status-bar-time">9:41</span></div>
    <div class="status-bar-right"><span>●●●</span><span>WiFi</span><span>100%</span></div>
  </div>

  <div class="nav-bar">
    <div class="nav-bar-left">
      <div class="nav-bar-back" onclick="goto('step-2-document.html')">‹</div>
    </div>
    <div class="nav-bar-center">
      <div class="nav-bar-title">开户认证</div>
    </div>
    <div class="nav-bar-right"></div>
  </div>

  <div class="screen" style="padding: 0;">

    <!-- 进度条 -->
    <div class="kyc-header">
      <div class="kyc-progress">
        <div class="kyc-progress-bar">
          <div class="kyc-progress-fill" style="width: 50%"></div>
        </div>
        <div class="kyc-progress-text">4/8</div>
      </div>
      <div class="kyc-title">财务状况</div>
      <div class="kyc-subtitle">帮助我们了解您的财务信息</div>
    </div>

    <div style="padding: var(--space-4);">
      <div class="form-section">
        <div class="form-label">年收入（美元等值）</div>
        <select class="form-input">
          <option>< $30,000</option>
          <option selected>$30,000 - $75,000</option>
          <option>$75,000 - $200,000</option>
          <option>$200,000 - $500,000</option>
          <option>> $500,000</option>
        </select>

        <div class="form-label">总净资产（美元）</div>
        <select class="form-input">
          <option>< $50,000</option>
          <option selected>$50,000 - $200,000</option>
          <option>$200,000 - $1,000,000</option>
          <option>$1,000,000 - $5,000,000</option>
          <option>> $5,000,000</option>
        </select>

        <div class="form-label">流动净资产（美元）</div>
        <select class="form-input">
          <option selected>$50,000 - $200,000</option>
          <option>$200,000 - $1,000,000</option>
          <option>$1,000,000 - $5,000,000</option>
          <option>> $5,000,000</option>
        </select>
        <div style="font-size: var(--text-xs); color: var(--color-text-tertiary); margin-top: -6px; margin-bottom: var(--space-3);">
          必须 ≤ 总净资产
        </div>
      </div>

      <div class="form-section">
        <div class="form-label">资金来源（可多选）</div>
        <div class="checkbox-row">
          <input type="checkbox" id="source1" checked>
          <label for="source1">工资薪金</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="source2">
          <label for="source2">经营收入</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="source3">
          <label for="source3">投资收益</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="source4">
          <label for="source4">遗产赠与</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="source5">
          <label for="source5">房产出租</label>
        </div>
      </div>

      <div class="info-card" style="margin-bottom: var(--space-4);">
        📌 <strong>提示：</strong> 如果净资产 ≥ $25,000，您有资格参与日内交易（Pattern Day Trader）
      </div>
    </div>

  </div>

  <!-- 操作按钮 -->
  <div class="form-actions">
    <button class="btn btn-ghost" onclick="goto('step-3-address.html')">上一步</button>
    <button class="btn btn-primary" onclick="goto('step-5-investment.html')">下一步</button>
  </div>

  <div class="tab-bar" style="display: none;"></div>
</div>

<script src="../../_shared/proto-router.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>02-KYC — Step 5 投资评估</title>

  <link rel="stylesheet" href="../../_design-system/tokens.css">
  <link rel="stylesheet" href="../../_design-system/components.css">
  <link rel="stylesheet" href="../../_design-system/proto-base.css">

  <style>
    .kyc-header {
      padding: var(--space-4) var(--space-4);
      border-bottom: 1px solid var(--color-divider);
      background: var(--color-bg-surface);
    }

    .kyc-progress {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-3);
    }

    .kyc-progress-bar {
      flex: 1;
      height: 6px;
      background: var(--color-bg-elevated);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .kyc-progress-fill {
      height: 100%;
      background: var(--color-primary);
      border-radius: var(--radius-full);
    }

    .kyc-progress-text {
      font-size: var(--text-xs);
      font-weight: var(--font-weight-bold);
      color: var(--color-primary);
      min-width: 50px;
      text-align: right;
    }

    .kyc-title {
      font-size: var(--text-lg);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-1);
    }

    .kyc-subtitle {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }

    .form-section {
      background: var(--color-bg-surface);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .form-label {
      font-size: var(--text-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-2);
    }

    .form-input {
      width: 100%;
      padding: var(--space-3);
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-divider);
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      color: var(--color-text-primary);
      outline: none;
      margin-bottom: var(--space-3);
      transition: all var(--transition-fast);
    }

    .form-input:last-child {
      margin-bottom: 0;
    }

    .form-input:focus {
      border-color: var(--color-primary);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) 0;
      margin-bottom: var(--space-2);
    }

    .checkbox-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .checkbox-row label {
      flex: 1;
      font-size: var(--text-sm);
      color: var(--color-text-primary);
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="proto-nav">
  <strong>📱 02-KYC — Step 5 投资评估</strong><br>
  🔗 <a href="step-4-finance.html">Step 4 财务</a> | <a href="step-6-tax.html">Step 6</a>
</div>

<div class="phone">
  <div class="status-bar">
    <div class="status-bar-left"><span class="status-bar-time">9:41</span></div>
    <div class="status-bar-right"><span>●●●</span><span>WiFi</span><span>100%</span></div>
  </div>

  <div class="nav-bar">
    <div class="nav-bar-left">
      <div class="nav-bar-back" onclick="goto('step-4-finance.html')">‹</div>
    </div>
    <div class="nav-bar-center">
      <div class="nav-bar-title">开户认证</div>
    </div>
    <div class="nav-bar-right"></div>
  </div>

  <div class="screen" style="padding: 0;">

    <!-- 进度条 -->
    <div class="kyc-header">
      <div class="kyc-progress">
        <div class="kyc-progress-bar">
          <div class="kyc-progress-fill" style="width: 62%"></div>
        </div>
        <div class="kyc-progress-text">5/8</div>
      </div>
      <div class="kyc-title">投资评估</div>
      <div class="kyc-subtitle">了解您的投资经验和偏好</div>
    </div>

    <div style="padding: var(--space-4);">
      <div class="form-section">
        <div class="form-label">股票投资年限</div>
        <select class="form-input">
          <option>无投资经验</option>
          <option selected>1-3 年</option>
          <option>3-5 年</option>
          <option>5-10 年</option>
          <option>10 年以上</option>
        </select>

        <div class="form-label">年均交易频次</div>
        <select class="form-input">
          <option>极少（< 5 次）</option>
          <option selected>偶尔（5-20 次）</option>
          <option>频繁（> 20 次）</option>
        </select>

        <div class="form-label">投资目标</div>
        <select class="form-input">
          <option>资本保全</option>
          <option>稳定收益</option>
          <option selected>资本增值</option>
          <option>高风险高回报</option>
        </select>

        <div class="form-label">风险承受能力</div>
        <select class="form-input">
          <option>保守型</option>
          <option>稳健型</option>
          <option selected>平衡型</option>
          <option>进取型</option>
        </select>
      </div>

      <div class="form-section">
        <div class="form-label">了解的投资产品（可多选）</div>
        <div class="checkbox-row">
          <input type="checkbox" id="product1" checked>
          <label for="product1">股票</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="product2" checked>
          <label for="product2">ETF</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="product3">
          <label for="product3">债券</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="product4">
          <label for="product4">期权</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="product5">
          <label for="product5">期货</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="product6">
          <label for="product6">外汇</label>
        </div>
      </div>

      <div class="alert alert-info" style="margin-bottom: var(--space-4);">
        <div class="alert-icon">ℹ️</div>
        <div class="alert-content">
          <div class="alert-title">风险评级</div>
          <div class="alert-message">系统根据您的回答自动计算风险等级（R1-R5），用于后续产品权限管理</div>
        </div>
      </div>
    </div>

  </div>

  <!-- 操作按钮 -->
  <div class="form-actions">
    <button class="btn btn-ghost" onclick="goto('step-4-finance.html')">上一步</button>
    <button class="btn btn-primary" onclick="goto('step-6-tax.html')">下一步</button>
  </div>

  <div class="tab-bar" style="display: none;"></div>
</div>

<script src="../../_shared/proto-router.js"></script>

</body>
</html>

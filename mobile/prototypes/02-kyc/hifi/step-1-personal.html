<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>02-KYC — Step 1 个人信息</title>

  <link rel="stylesheet" href="../../_design-system/tokens.css">
  <link rel="stylesheet" href="../../_design-system/components.css">
  <link rel="stylesheet" href="../../_design-system/proto-base.css">

  <style>
    .kyc-header {
      padding: var(--space-4) var(--space-4);
      border-bottom: 1px solid var(--color-divider);
      background: var(--color-bg-surface);
    }

    .kyc-progress {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-3);
    }

    .kyc-progress-bar {
      flex: 1;
      height: 6px;
      background: var(--color-bg-elevated);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .kyc-progress-fill {
      height: 100%;
      background: var(--color-primary);
      border-radius: var(--radius-full);
      transition: width var(--transition-normal);
    }

    .kyc-progress-text {
      font-size: var(--text-xs);
      font-weight: var(--font-weight-bold);
      color: var(--color-primary);
      min-width: 50px;
      text-align: right;
    }

    .kyc-title {
      font-size: var(--text-lg);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-1);
    }

    .kyc-subtitle {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }

    .form-section {
      background: var(--color-bg-surface);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .form-label {
      font-size: var(--text-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .form-label-required {
      color: var(--color-loss);
      font-weight: var(--font-weight-bold);
    }

    .form-input {
      width: 100%;
      padding: var(--space-3);
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-divider);
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      color: var(--color-text-primary);
      outline: none;
      margin-bottom: var(--space-3);
      transition: all var(--transition-fast);
    }

    .form-input:last-child {
      margin-bottom: 0;
    }

    .form-input:focus {
      border-color: var(--color-primary);
    }

    .form-input::placeholder {
      color: var(--color-text-tertiary);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .form-row .form-input {
      margin-bottom: 0;
    }

    .form-hint {
      font-size: var(--text-xs);
      color: var(--color-text-tertiary);
      margin-top: -6px;
      margin-bottom: var(--space-3);
    }

    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
      margin-bottom: var(--space-3);
      padding: var(--space-3);
      background: var(--color-bg-elevated);
      border-radius: var(--radius-md);
    }

    .checkbox-row input {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .form-checkbox-label {
      flex: 1;
      font-size: var(--text-sm);
      color: var(--color-text-primary);
      cursor: pointer;
    }

    .form-actions {
      display: flex;
      gap: var(--space-2);
      padding: var(--space-4);
      padding-bottom: calc(var(--space-4) + 34px);
    }

    .form-actions button {
      flex: 1;
    }
  </style>
</head>
<body>

<div class="proto-nav">
  <strong>📱 02-KYC — Step 1 个人信息</strong><br>
  🔗 <a href="step-2-document.html">Step 2 证件</a> | <a href="step-4-finance.html">Step 4 财务</a> | <a href="step-5-investment.html">Step 5 投资</a>
</div>

<div class="phone">
  <div class="status-bar">
    <div class="status-bar-left"><span class="status-bar-time">9:41</span></div>
    <div class="status-bar-right"><span>●●●</span><span>WiFi</span><span>100%</span></div>
  </div>

  <div class="nav-bar">
    <div class="nav-bar-left"></div>
    <div class="nav-bar-center">
      <div class="nav-bar-title">开户认证</div>
    </div>
    <div class="nav-bar-right"></div>
  </div>

  <div class="screen" style="padding: 0;">

    <!-- 进度条 -->
    <div class="kyc-header">
      <div class="kyc-progress">
        <div class="kyc-progress-bar">
          <div class="kyc-progress-fill" style="width: 12%"></div>
        </div>
        <div class="kyc-progress-text">1/8</div>
      </div>
      <div class="kyc-title">个人信息</div>
      <div class="kyc-subtitle">请填写真实信息，与证件必须一致</div>
    </div>

    <div style="padding: var(--space-4);">
      <!-- 基本信息 -->
      <div class="form-section">
        <div class="form-label">
          英文名 (First Name)
          <span class="form-label-required">*</span>
        </div>
        <input type="text" class="form-input" placeholder="e.g. Zhang">
        <div class="form-hint">仅允许英文字母，需与证件一致</div>

        <div class="form-label">
          英文姓 (Last Name)
          <span class="form-label-required">*</span>
        </div>
        <input type="text" class="form-input" placeholder="e.g. San">

        <div class="form-label">
          中文姓名 (可选)
        </div>
        <input type="text" class="form-input" placeholder="e.g. 张三">

        <div class="form-label">
          出生日期
          <span class="form-label-required">*</span>
        </div>
        <input type="date" class="form-input" value="1990-01-15">
        <div class="form-hint">必须满 18 岁</div>
      </div>

      <!-- 国籍和证件 -->
      <div class="form-section">
        <div class="form-label">
          国籍
          <span class="form-label-required">*</span>
        </div>
        <select class="form-input">
          <option selected>中国</option>
          <option>中国香港</option>
          <option>中国台湾</option>
          <option>美国</option>
        </select>

        <div class="form-label">
          居住地区
          <span class="form-label-required">*</span>
        </div>
        <div class="form-row">
          <select class="form-input" style="margin-bottom: 0;">
            <option selected>广东省</option>
            <option>北京市</option>
            <option>上海市</option>
            <option>浙江省</option>
          </select>
          <select class="form-input" style="margin-bottom: 0;">
            <option selected>深圳市</option>
            <option>广州市</option>
          </select>
        </div>
        <div class="form-hint">用于税务申报和合规审核</div>

        <div class="form-label">
          证件类型
          <span class="form-label-required">*</span>
        </div>
        <select class="form-input">
          <option selected>身份证</option>
          <option>护照</option>
          <option>港澳通行证</option>
          <option>HKID</option>
        </select>
      </div>

      <!-- 就业信息 -->
      <div class="form-section">
        <div class="form-label">
          就业状态
          <span class="form-label-required">*</span>
        </div>
        <select class="form-input">
          <option selected>在职</option>
          <option>自雇</option>
          <option>退休</option>
          <option>学生</option>
          <option>其他</option>
        </select>

        <div class="form-label">
          职业
          <span class="form-label-required">*</span>
        </div>
        <input type="text" class="form-input" placeholder="e.g. Software Engineer">

        <div class="form-label">
          雇主名称
          <span class="form-label-required">*</span>
        </div>
        <input type="text" class="form-input" placeholder="e.g. Tech Company Inc.">
      </div>

      <!-- 特殊身份 -->
      <div class="form-section">
        <div class="form-label">特殊身份说明</div>

        <div class="checkbox-row">
          <input type="checkbox" id="pep">
          <div style="flex: 1;">
            <label for="pep" class="form-checkbox-label">
              我是政治敏感人士 (PEP) 或其关联人
            </label>
            <div class="form-checkbox-sublabel">
              指现任或前任公职人员、国有企业高管或家庭成员
            </div>
          </div>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="insider">
          <label for="insider" class="form-checkbox-label">
            我在证券公司或其关联机构工作
          </label>
        </div>
      </div>

      <div class="alert alert-info" style="margin-bottom: var(--space-4);">
        <div class="alert-icon">ℹ️</div>
        <div class="alert-content">
          <div class="alert-title">如勾选特殊身份</div>
          <div class="alert-message">需要人工审核，审核时间会延长至 2-3 个工作日</div>
        </div>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="form-actions">
      <button class="btn btn-primary" onclick="goto('step-2-document.html')">下一步</button>
    </div>

  </div>

  <div class="tab-bar" style="display: none;"></div>
</div>

<script src="../../_shared/proto-router.js"></script>

</body>
</html>

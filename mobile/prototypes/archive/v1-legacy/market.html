<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>行情 - 券商交易</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .tab-active { color: #1F2937; border-bottom: 2px solid #3B82F6; }
        .price-up { color: #10B981; }
        .price-down { color: #EF4444; }
        .sheet-enter { transform: translateY(100%); }
        .sheet-visible { transform: translateY(0); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); }
        .overlay-fade { transition: opacity 0.25s ease; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-md mx-auto min-h-screen bg-white">
        <!-- Header -->
        <div class="bg-white border-b border-gray-200 sticky top-0 z-10">
            <div class="flex items-center justify-between px-4 py-3">
                <h1 class="text-lg font-semibold">行情</h1>
                <div class="flex items-center space-x-3">
                    <a href="search.html" id="searchBtn" class="p-2 hover:bg-gray-100 rounded-lg">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </a>
                    <button class="p-2 hover:bg-gray-100 rounded-lg">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Tabs -->
            <div class="flex border-b border-gray-200">
                <button class="tab-active flex-1 py-3 text-sm font-medium" data-tab="watchlist">自选</button>
                <button class="flex-1 py-3 text-sm font-medium text-gray-500" data-tab="us">美股</button>
                <button class="flex-1 py-3 text-sm font-medium text-gray-500" data-tab="hk">港股</button>
                <button class="flex-1 py-3 text-sm font-medium text-gray-500" data-tab="hot">热门</button>
            </div>
        </div>

        <!-- Guest Mode: Delayed Data Banner (visible when not logged in) -->
        <div id="guestBanner" class="bg-amber-50 border-b border-amber-200 px-4 py-2 flex items-center justify-between hidden">
            <div class="flex items-center gap-2 text-xs text-amber-800">
                <span class="bg-amber-200 text-amber-900 font-bold px-1.5 py-0.5 rounded text-[10px]">延迟</span>
                <span>行情延迟 15 分钟，登录获取实时行情</span>
            </div>
            <a href="login.html" class="text-xs text-blue-600 font-medium whitespace-nowrap ml-2">去登录</a>
        </div>

        <!-- Stock List -->
        <div id="stockList" class="divide-y divide-gray-100">
            <!-- Stock items will be inserted here -->
        </div>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200">
            <div class="max-w-md mx-auto flex">
                <a href="market.html" class="flex-1 flex flex-col items-center py-2 text-blue-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"/>
                    </svg>
                    <span class="text-xs mt-1">行情</span>
                </a>
                <a href="orders.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 guest-block">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    <span class="text-xs mt-1">订单</span>
                </a>
                <a href="portfolio.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 guest-block">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
                    </svg>
                    <span class="text-xs mt-1">持仓</span>
                </a>
                <a href="profile.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 guest-block">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <span class="text-xs mt-1">我的</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Guest mode detection: check URL param ?guest=1 or default to guest
        const urlParams = new URLSearchParams(window.location.search);
        const isGuest = urlParams.get('guest') === '1';

        const stocks = [
            { symbol: 'AAPL', name: 'Apple Inc.', price: 175.23, change: 2.34, changePercent: 1.35, up: true, marketCap: '2.8T', pe: 28.5, volume: '45.2M' },
            { symbol: 'TSLA', name: 'Tesla Inc.', price: 245.67, change: -3.21, changePercent: -1.29, up: false, marketCap: '780B', pe: 65.3, volume: '52.1M' },
            { symbol: 'MSFT', name: 'Microsoft', price: 378.90, change: 5.12, changePercent: 1.37, up: true, marketCap: '2.9T', pe: 32.1, volume: '38.7M' },
            { symbol: 'GOOGL', name: 'Alphabet', price: 142.56, change: -1.89, changePercent: -1.31, up: false, marketCap: '1.8T', pe: 24.8, volume: '28.3M' },
            { symbol: 'AMZN', name: 'Amazon', price: 178.34, change: 3.45, changePercent: 1.97, up: true, marketCap: '1.9T', pe: 58.2, volume: '41.5M' },
            { symbol: 'NVDA', name: 'NVIDIA', price: 823.45, change: 12.67, changePercent: 1.56, up: true, marketCap: '2.1T', pe: 72.4, volume: '67.8M' }
        ];

        // Show guest banner if in guest mode
        if (isGuest) {
            document.getElementById('guestBanner').classList.remove('hidden');
            document.getElementById('searchBtn').href = 'search.html?guest=1';
            // Intercept bottom tabs for guest mode
            document.querySelectorAll('.guest-block').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    e.preventDefault();
                    openGuestLoginSheet();
                });
            });
        }

        const delayBadge = isGuest
            ? '<span class="ml-1.5 bg-amber-200 text-amber-900 font-bold px-1 py-0.5 rounded text-[9px] leading-none align-middle">延迟</span>'
            : '';

        function renderStocks() {
            const listEl = document.getElementById('stockList');
            listEl.innerHTML = stocks.map(stock => `
                <a href="stock-detail.html?symbol=${stock.symbol}${isGuest ? '&guest=1' : ''}" class="block px-4 py-3 hover:bg-gray-50 active:bg-gray-100">
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <div class="flex items-center">
                                <span class="font-semibold text-gray-900">${stock.symbol}</span>
                                <span class="${stock.up ? 'price-up' : 'price-down'} ml-2 text-sm">
                                    ${stock.up ? '▲' : '▼'}
                                </span>
                                <span class="text-sm text-gray-500 ml-2">${stock.name}</span>
                            </div>
                            <div class="text-xs text-gray-400 mt-1">
                                市值 ${stock.marketCap} | PE ${stock.pe} | 成交量 ${stock.volume}
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-lg font-semibold ${stock.up ? 'price-up' : 'price-down'}">
                                $${stock.price.toFixed(2)}${delayBadge}
                            </div>
                            <div class="text-sm ${stock.up ? 'price-up' : 'price-down'}">
                                ${stock.change > 0 ? '+' : ''}${stock.change.toFixed(2)} (${stock.changePercent > 0 ? '+' : ''}${stock.changePercent.toFixed(2)}%)
                            </div>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        // Tab switching — 港股 Tab 显示"即将上线"（Phase 1 仅美股）
        document.querySelectorAll('[data-tab]').forEach(tab => {
            tab.addEventListener('click', function() {
                const tabName = this.dataset.tab;

                // 港股 Tab: 显示即将上线提示
                if (tabName === 'hk') {
                    document.getElementById('stockList').innerHTML = `
                        <div class="flex flex-col items-center justify-center py-20 text-center px-8">
                            <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mb-4">
                                <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                            </div>
                            <div class="text-base font-semibold text-gray-700 mb-2">港股交易即将上线</div>
                            <div class="text-sm text-gray-500">我们正在接入香港交易所 (HKEX)，<br/>港股交易功能将在下一版本推出。</div>
                        </div>
                    `;
                } else {
                    renderStocks();
                }

                // Update tab styles
                document.querySelectorAll('[data-tab]').forEach(t => {
                    t.classList.remove('tab-active', 'text-gray-900');
                    t.classList.add('text-gray-500');
                });
                this.classList.add('tab-active', 'text-gray-900');
                this.classList.remove('text-gray-500');
            });
        });

        renderStocks();

        /* ---- Guest login sheet ---- */
        function openGuestLoginSheet() {
            var overlay = document.getElementById('guestLoginSheet');
            var panel = document.getElementById('guestLoginSheetPanel');
            overlay.classList.remove('hidden');
            requestAnimationFrame(function() {
                panel.classList.remove('sheet-enter');
                panel.classList.add('sheet-visible');
            });
        }
        function closeGuestLoginSheet() {
            var overlay = document.getElementById('guestLoginSheet');
            var panel = document.getElementById('guestLoginSheetPanel');
            panel.classList.remove('sheet-visible');
            panel.classList.add('sheet-enter');
            setTimeout(function() { overlay.classList.add('hidden'); }, 300);
        }
    </script>

    <!-- Guest Login Bottom Sheet -->
    <div id="guestLoginSheet" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50 overlay-fade" onclick="closeGuestLoginSheet()"></div>
        <div class="absolute bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-2xl sheet-enter" id="guestLoginSheetPanel" onclick="event.stopPropagation()">
            <div class="flex justify-center pt-3 pb-1">
                <div class="w-9 h-1 bg-gray-300 rounded-full"></div>
            </div>
            <div class="px-5 pt-3 pb-8">
                <div class="flex flex-col items-center mb-6">
                    <div class="w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center mb-3">
                        <svg class="w-7 h-7 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-900">登录后即可使用</h3>
                    <p class="text-sm text-gray-500 text-center mt-1.5">登录账户后可查看订单、持仓等信息</p>
                </div>
                <a href="login.html" class="block w-full py-3.5 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold rounded-xl text-base text-center mb-3 transition-colors">去登录</a>
                <a href="login.html" class="block w-full py-3.5 text-blue-600 font-medium text-base text-center mb-3 hover:underline">注册新账户</a>
                <button onclick="closeGuestLoginSheet()" class="w-full py-3.5 bg-gray-100 hover:bg-gray-200 active:bg-gray-300 text-gray-600 font-semibold rounded-xl text-base transition-colors">继续浏览行情</button>
            </div>
        </div>
    </div>
</body>
</html>

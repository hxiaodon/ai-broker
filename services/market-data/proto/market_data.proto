syntax = "proto3";

package marketdata.v1;

option go_package = "github.com/brokerage/services/market-data/proto/v1;marketdatav1";

import "google/protobuf/timestamp.proto";

// ============================================================
// Core Market Data Messages
// ============================================================

// Quote — Level 1 行情快照
message Quote {
  string symbol = 1;            // 标的代码 (e.g., "AAPL", "0700.HK")
  Market market = 2;            // 市场
  string currency = 3;          // 币种 ("USD", "HKD")

  // 最新成交
  string last_price = 4;        // 最新价 (string 避免精度丢失)
  int64  last_volume = 5;       // 最新成交量
  int64  timestamp_nanos = 6;   // 数据时间戳 (Unix nanos)

  // 买卖盘 (Level 1)
  string bid_price = 7;
  int64  bid_size = 8;
  string ask_price = 9;
  int64  ask_size = 10;

  // 日内统计
  string open = 11;
  string high = 12;
  string low = 13;
  string prev_close = 14;
  int64  volume = 15;           // 累计成交量
  string turnover = 16;         // 累计成交额

  // 涨跌
  string change = 17;           // 涨跌额
  string change_pct = 18;       // 涨跌幅

  // 状态
  TradingStatus status = 19;
  MarketSession session = 20;
}

// Depth — Level 2 深度行情
message Depth {
  string symbol = 1;
  Market market = 2;
  int64  timestamp_nanos = 3;
  repeated PriceLevel bids = 4; // 买盘 (价格降序)
  repeated PriceLevel asks = 5; // 卖盘 (价格升序)
}

message PriceLevel {
  string price = 1;
  int64  volume = 2;
  int32  order_count = 3;
}

// Trade — 逐笔成交
message Trade {
  string symbol = 1;
  Market market = 2;
  string price = 3;
  int64  volume = 4;
  int64  timestamp_nanos = 5;
  string trade_id = 6;
  TradeSide side = 7;
  repeated TradeCondition conditions = 8;
}

// Kline — K线
message Kline {
  string symbol = 1;
  Market market = 2;
  string open = 3;
  string high = 4;
  string low = 5;
  string close = 6;
  int64  volume = 7;
  string turnover = 8;
  int64  timestamp_nanos = 9;   // K线起始时间
  KlineInterval interval = 10;
  int32  trade_count = 11;
}

// ============================================================
// Enums
// ============================================================

enum Market {
  MARKET_UNKNOWN = 0;
  MARKET_US = 1;
  MARKET_HK = 2;
}

enum TradingStatus {
  TRADING_STATUS_UNKNOWN = 0;
  TRADING_STATUS_PRE_MARKET = 1;
  TRADING_STATUS_TRADING = 2;
  TRADING_STATUS_LUNCH_BREAK = 3;
  TRADING_STATUS_POST_MARKET = 4;
  TRADING_STATUS_CLOSED = 5;
  TRADING_STATUS_HALTED = 6;
  TRADING_STATUS_SUSPENDED = 7;
}

enum MarketSession {
  SESSION_UNKNOWN = 0;
  SESSION_REGULAR = 1;
  SESSION_PRE = 2;
  SESSION_POST = 3;
  SESSION_EXTENDED = 4;
}

enum TradeSide {
  SIDE_UNKNOWN = 0;
  SIDE_BUY = 1;
  SIDE_SELL = 2;
}

enum TradeCondition {
  CONDITION_UNKNOWN = 0;
  CONDITION_REGULAR_SALE = 1;
  CONDITION_ODD_LOT = 2;
  CONDITION_CROSS_TRADE = 3;
  CONDITION_DARK_POOL = 4;
}

enum KlineInterval {
  INTERVAL_UNKNOWN = 0;
  INTERVAL_1M = 1;
  INTERVAL_5M = 2;
  INTERVAL_15M = 3;
  INTERVAL_30M = 4;
  INTERVAL_1H = 5;
  INTERVAL_1D = 6;
  INTERVAL_1W = 7;
  INTERVAL_1MO = 8;
}

// ============================================================
// Service Definitions
// ============================================================

// MarketDataService — 行情查询服务 (gRPC)
service MarketDataService {
  // 获取实时行情快照
  rpc GetQuote(GetQuoteRequest) returns (GetQuoteResponse);

  // 批量获取行情快照
  rpc GetQuotes(GetQuotesRequest) returns (GetQuotesResponse);

  // 获取深度行情
  rpc GetDepth(GetDepthRequest) returns (GetDepthResponse);

  // 查询历史 K 线
  rpc GetKlines(GetKlinesRequest) returns (GetKlinesResponse);

  // 查询逐笔成交
  rpc GetTrades(GetTradesRequest) returns (GetTradesResponse);

  // 实时行情流 (Server-Side Streaming)
  rpc StreamQuotes(StreamQuotesRequest) returns (stream Quote);

  // 实时深度行情流
  rpc StreamDepth(StreamDepthRequest) returns (stream Depth);

  // 实时逐笔成交流
  rpc StreamTrades(StreamTradesRequest) returns (stream Trade);
}

// ============================================================
// Request / Response Messages
// ============================================================

message GetQuoteRequest {
  string symbol = 1;
  Market market = 2;
}

message GetQuoteResponse {
  Quote quote = 1;
}

message GetQuotesRequest {
  repeated string symbols = 1;
  Market market = 2;
}

message GetQuotesResponse {
  repeated Quote quotes = 1;
}

message GetDepthRequest {
  string symbol = 1;
  Market market = 2;
  int32  levels = 3;  // 档数 (5, 10, 20)
}

message GetDepthResponse {
  Depth depth = 1;
}

message GetKlinesRequest {
  string symbol = 1;
  Market market = 2;
  KlineInterval interval = 3;
  int64 from_timestamp = 4;     // Unix seconds
  int64 to_timestamp = 5;       // Unix seconds
  int32 limit = 6;              // max 1000
}

message GetKlinesResponse {
  repeated Kline klines = 1;
  bool has_more = 2;
}

message GetTradesRequest {
  string symbol = 1;
  Market market = 2;
  int64 from_timestamp = 3;
  int64 to_timestamp = 4;
  int32 limit = 5;              // max 1000
}

message GetTradesResponse {
  repeated Trade trades = 1;
  bool has_more = 2;
}

message StreamQuotesRequest {
  repeated string symbols = 1;
  Market market = 2;
}

message StreamDepthRequest {
  string symbol = 1;
  Market market = 2;
  int32  levels = 3;
}

message StreamTradesRequest {
  repeated string symbols = 1;
  Market market = 2;
}

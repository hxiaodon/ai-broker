// 设计草稿（Design Draft）
// Ground truth：market-api-spec.md v2.1 + market-data-system.md v2.1 + contracts/market-data-to-trading.md
// 正式 canonical 文件将在 Step 1.5 创建于 repo 根目录 api/market_data/v1/
// WebSocket 控制消息使用 JSON 文本帧，行情数据使用 WsQuoteFrame 二进制帧（见 websocket-spec.md）。

syntax = "proto3";

package brokerage.market_data.v1;

// 正式 canonical 文件将在 Step 1.5 创建于 repo 根目录 api/market_data/v1/
option go_package = "github.com/hxiaodon/ai-broker/api/market_data/v1;market_datav1";

import "google/protobuf/timestamp.proto";

// ──────────────────────────────────────────────────────────────────────────
// Enums
// ──────────────────────────────────────────────────────────────────────────

// Market 标识交易所所在市场（来源：market-api-spec.md §1.4）
enum Market {
  MARKET_UNSPECIFIED = 0;
  MARKET_US          = 1; // NYSE / NASDAQ
  MARKET_HK          = 2; // HKEX
}

// MarketStatus 标识当前交易时段（来源：market-api-spec.md §1.4）
enum MarketStatus {
  MARKET_STATUS_UNSPECIFIED  = 0;
  MARKET_STATUS_REGULAR      = 1; // 常规交易时段
  MARKET_STATUS_PRE_MARKET   = 2; // 盘前交易（美股）
  MARKET_STATUS_AFTER_HOURS  = 3; // 盘后交易（美股）
  MARKET_STATUS_CLOSED       = 4; // 已收盘
  MARKET_STATUS_HALTED       = 5; // 临时停牌
}

// ──────────────────────────────────────────────────────────────────────────
// Quote — 实时行情快照
// 来源：market-api-spec.md §3.3 + §7.3
// 规范：所有价格字段使用 string（禁止 float/double，财务编码规范 Rule 1）
//       时间戳使用 google.protobuf.Timestamp（UTC），JSON encoding 自动序列化为 RFC 3339
// ──────────────────────────────────────────────────────────────────────────
message Quote {
  string       symbol         = 1;  // 股票代码（美股字母如 "AAPL"，港股数字如 "0700"）
  Market       market         = 2;  // 市场

  // 价格字段（US: 4位小数；HK: 3位小数）
  string       price          = 3;  // 最新成交价
  string       change         = 4;  // 涨跌额（相对前一 Regular Session 收盘价）
  string       change_pct     = 5;  // 涨跌幅（%，2位小数，含正负号，如 "1.30" / "-0.82"）
  int64        volume         = 6;  // 当日累计成交量（股）
  string       bid            = 7;  // 买一价
  string       ask            = 8;  // 卖一价
  string       open           = 9;  // 当日开盘价
  string       high           = 10; // 当日最高价
  string       low            = 11; // 当日最低价
  string       prev_close     = 12; // 前一 Regular Session 收盘价（涨跌基准，≠ 盘后收盘价）
  string       turnover       = 13; // 当日成交额，带单位（如 "8.24B"）

  MarketStatus market_status  = 14; // 当前交易时段

  // 数据质量字段（来源：market-data-system.md Appendix D）
  // 展示阈值：5s；交易风控阈值：1s（由 Trading Engine 自行基于 timestamp 计算）
  bool         is_stale       = 15; // true = 数据超过展示阈值 5s
  int64        stale_since_ms = 16; // 陈旧持续时长（毫秒），is_stale=false 时为 0

  bool                      delayed   = 17; // true = 延时 15 分钟（访客）
  google.protobuf.Timestamp timestamp = 18; // 行情时间戳（UTC）；JSON encoding → RFC 3339
}

// ──────────────────────────────────────────────────────────────────────────
// gRPC Service — 供 Trading Engine 调用（预交易风控、交易时段判断）
// 来源：contracts/market-data-to-trading.md
// ──────────────────────────────────────────────────────────────────────────
service MarketDataService {
  // GetQuote 按需查询最新报价，主要用于下单前的价格验证和风控检查。
  // Trading Engine 应检查 Quote.timestamp，若超过 1s 则视为数据过旧并拒绝市价单。
  rpc GetQuote(GetQuoteRequest) returns (GetQuoteResponse);

  // GetMarketStatus 查询市场当前交易时段，用于交易时段执行控制。
  rpc GetMarketStatus(GetMarketStatusRequest) returns (GetMarketStatusResponse);
}

message GetQuoteRequest {
  repeated string symbols = 1; // 最多 50 个，混合 US/HK 均可
}

message GetQuoteResponse {
  map<string, Quote>        quotes = 1; // key = symbol；symbol 不存在时不出现在 map 中
  google.protobuf.Timestamp as_of  = 2; // 快照时间（UTC）；JSON encoding → RFC 3339
}

message GetMarketStatusRequest {
  Market market = 1;
}

message GetMarketStatusResponse {
  Market                    market        = 1;
  MarketStatus              status        = 2;
  google.protobuf.Timestamp session_open  = 3; // 当日交易时段开始（UTC）；JSON encoding → RFC 3339
  google.protobuf.Timestamp session_close = 4; // 当日交易时段结束（UTC）；JSON encoding → RFC 3339
  google.protobuf.Timestamp as_of         = 5; // 状态查询时间（UTC）；JSON encoding → RFC 3339
}

// ──────────────────────────────────────────────────────────────────────────
// WebSocket 二进制帧消息（服务端 → 客户端）
// 来源：websocket-spec.md v2.1（混合帧协议）
// 控制消息（auth、subscribe、ping 等）使用 JSON 文本帧，不走 proto。
// 所有行情数据（snapshot / tick / delayed）使用此消息序列化为二进制帧。
// ──────────────────────────────────────────────────────────────────────────

message WsQuoteFrame {
  enum FrameType {
    FRAME_TYPE_UNSPECIFIED = 0;
    FRAME_TYPE_SNAPSHOT    = 1; // subscribe 后立即推送的完整快照（所有 Quote 字段）
    FRAME_TYPE_TICK        = 2; // 注册用户 tick 级更新（只含变动字段，未变动字段为 proto3 零值）
    FRAME_TYPE_DELAYED     = 3; // 访客 T-15min 快照（每 5 秒，完整字段，delayed=true）
  }

  FrameType frame_type = 1;
  Quote     quote      = 2;
}

// ──────────────────────────────────────────────────────────────────────────
// Kafka 事件消息体
// Topic：brokerage.market-data.quote.updated（来源：market-data-system.md + kafka-topology.md）
// 消费方：Trading Engine（维护内部报价缓存，用于批量风控计算）
// ──────────────────────────────────────────────────────────────────────────

// QuoteUpdatedEvent 是 Kafka topic brokerage.market-data.quote.updated 的消息体。
// 每次 feed handler 收到新 tick 时发布。
message QuoteUpdatedEvent {
  string                    event_id    = 1; // UUID v4，消费方幂等去重键
  google.protobuf.Timestamp occurred_at = 2; // 事件发生时间（UTC）；JSON encoding → RFC 3339
  Quote                     quote       = 3; // 完整行情快照
}

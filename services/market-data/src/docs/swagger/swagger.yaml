info:
  contact: {}
paths:
  /kline:
    get:
      consumes:
      - application/json
      description: Returns OHLCV candlestick bars for a symbol and interval. Historical
        prices use split+dividend backward adjustment.
      parameters:
      - description: Stock symbol (e.g. AAPL, 00700)
        in: query
        name: symbol
        required: true
        type: string
      - default: 1D
        description: Bar interval
        enum:
        - 1min
        - 5min
        - 15min
        - 30min
        - 1h
        - 1D
        - 1W
        - 1M
        in: query
        name: interval
        type: string
      - default: 200
        description: Maximum number of bars to return
        in: query
        name: limit
        type: integer
      - description: Start time in RFC 3339 format (e.g. 2024-01-01T00:00:00Z)
        in: query
        name: start
        type: string
      - description: End time in RFC 3339 format (e.g. 2024-12-31T23:59:59Z)
        in: query
        name: end
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_kline.KLine'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get K-line (candlestick) data
      tags:
      - kline
  /market/status:
    get:
      consumes:
      - application/json
      description: Returns the current trading phase and session times for a given
        market (US or HK).
      parameters:
      - default: US
        description: Market identifier (US or HK)
        enum:
        - US
        - HK
        in: query
        name: market
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_hxiaodon_ai-broker_services_market-data_internal_quote_domain.MarketStatus'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get market trading status
      tags:
      - quote
  /quote:
    get:
      consumes:
      - application/json
      description: Returns the latest quote snapshot for a given symbol. For guest
        users the price is delayed 15 minutes and labeled accordingly.
      parameters:
      - description: Stock symbol (e.g. AAPL, 00700)
        in: query
        name: symbol
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_hxiaodon_ai-broker_services_market-data_internal_quote_domain.Quote'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get real-time quote
      tags:
      - quote
  /search:
    get:
      consumes:
      - application/json
      description: Full-text search across stock symbols and company names. Supports
        US (NYSE/NASDAQ) and HK (HKEX) markets.
      parameters:
      - description: Search query (symbol prefix or company name keyword)
        in: query
        name: q
        required: true
        type: string
      - description: Filter by market
        enum:
        - US
        - HK
        in: query
        name: market
        type: string
      - default: 20
        description: Maximum number of results
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_search.Stock'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Search stocks
      tags:
      - search
  /search/hot:
    get:
      consumes:
      - application/json
      description: Returns the top-N most searched symbols in the last 24 hours, ranked
        by search frequency.
      parameters:
      - default: 10
        description: Number of top symbols to return
        in: query
        name: "n"
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_search.HotSearchItem'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get hot search rankings
      tags:
      - search
  /watchlist:
    delete:
      consumes:
      - application/json
      description: Removes a stock symbol from the user's watchlist. No-op if symbol
        is not present.
      parameters:
      - description: User ID (temporary; production uses JWT claims)
        in: query
        name: user_id
        required: true
        type: integer
      - description: Stock symbol to remove
        in: query
        name: symbol
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Remove symbol from watchlist
      tags:
      - watchlist
    get:
      consumes:
      - application/json
      description: Returns all symbols in the user's watchlist with latest quotes.
      parameters:
      - description: User ID (temporary; production uses JWT claims)
        in: query
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_watchlist.WatchlistItem'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get user watchlist
      tags:
      - watchlist
    post:
      consumes:
      - application/json
      description: Adds a stock symbol to the user's watchlist. Duplicate symbols
        are ignored.
      parameters:
      - description: Symbol to add
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_watchlist.addWatchlistRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Add symbol to watchlist
      tags:
      - watchlist
swagger: "2.0"

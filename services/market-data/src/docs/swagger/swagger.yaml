      close:
        description: shopspring/decimal — never float64
        type: number
      endTime:
        description: Always UTC — end of the candle period
        type: string
      high:
        description: shopspring/decimal — never float64
        type: number
      id:
        format: int64
        type: integer
      interval:
        $ref: '#/definitions/internal_kline.Interval'
      low:
        description: shopspring/decimal — never float64
        type: number
      open:
        description: shopspring/decimal — never float64
        type: number
      startTime:
        description: Always UTC — start of the candle period

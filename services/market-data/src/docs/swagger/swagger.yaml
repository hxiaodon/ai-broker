    - HKEX
    x-enum-varnames:
    - MarketUS
    - MarketHK
  github_com_hxiaodon_ai-broker_services_market-data_internal_quote_domain.MarketStatus:
    properties:
      market:
        $ref: '#/definitions/github_com_hxiaodon_ai-broker_services_market-data_internal_quote_domain.Market'
      phase:
        $ref: '#/definitions/github_com_hxiaodon_ai-broker_services_market-data_internal_quote_domain.TradingPhase'
      updatedAt:
        description: Always UTC
        type: string
    type: object
  github_com_hxiaodon_ai-broker_services_market-data_internal_quote_domain.Quote:
    properties:
      ask:
        description: shopspring/decimal — never float64
        type: number
      askSize:

      bid:
        description: shopspring/decimal — never float64
        type: number
      bidSize:
        format: int64
        type: integer
      change:
        description: shopspring/decimal — never float64 — Price - PrevClose (unadjusted)
        type: number
      changePct:
        description: shopspring/decimal — never float64 — Change / PrevClose * 100
        type: number
      high:
        description: shopspring/decimal — never float64
        type: number
      isStale:
        description: true if quote exceeds stale threshold
        type: boolean
      lastUpdatedAt:
        description: Always UTC
        type: string
      low:
        description: shopspring/decimal — never float64
        type: number
      market:
        $ref: '#/definitions/github_com_hxiaodon_ai-broker_services_market-data_internal_quote_domain.Market'
      open:

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <style>
    .shield {
      fill: none;
      stroke: #1A73E8;
      stroke-width: 4.5;
      stroke-linejoin: round;
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      animation: draw-shield 0.6s ease-out 0.1s forwards;
    }
    .check {
      fill: none;
      stroke: #1A73E8;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: draw-check 0.35s ease-out 0.75s forwards;
    }
    @keyframes draw-shield {
      to { stroke-dashoffset: 0; }
    }
    @keyframes draw-check {
      to { stroke-dashoffset: 0; }
    }
  </style>
  <!-- Shield path -->
  <path class="shield" d="M40 8 L64 18 L64 38 C64 54 52 66 40 72 C28 66 16 54 16 38 L16 18 Z"/>
  <!-- Checkmark inside shield -->
  <polyline class="check" points="27,40 36,50 54,30"/>
</svg>

server:
  port: 8080
  mode: debug # debug/release

database:
  host: localhost
  port: 3306
  user: root
  password: your_password_here
  dbname: market_service
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600 # seconds

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 10
  min_idle_conns: 5

kafka:
  brokers:
    - localhost:9092
  topic: market_quotes
  group_id: market_service_group

polygon:
  api_key: "YOUR_POLYGON_API_KEY_HERE"
  base_url: "https://api.polygon.io"
  ws_url: "wss://socket.polygon.io"
  timeout: 30 # seconds

cache:
  quote_ttl: 5 # seconds - 实时行情缓存时间
  stock_info_ttl: 3600 # seconds - 股票基本信息缓存时间
  kline_ttl: 300 # seconds - K线数据缓存时间
  hot_search_ttl: 600 # seconds - 热门搜索缓存时间

websocket:
  read_buffer_size: 1024
  write_buffer_size: 1024
  heartbeat_interval: 30 # seconds
  max_connections: 10000

jwt:
  secret: "your-secret-key-change-in-production"
  expire_time: 24 # hours

cors:
  allowed_origins:
    - "https://app.broker.com"
    - "https://www.broker.com"
    - "http://localhost:3000"
    - "http://localhost:8080"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Authorization"
    - "Content-Type"
    - "X-Request-ID"

log:
  level: info # debug/info/warn/error
  format: json # json/text
  output: stdout # stdout/file
  file_path: logs/market-service.log

        /* Toast animation */
        #toast {

        #toast.show {

            transform: translateY(0);
        }
        #toast.hide {

<!-- Toast notification -->
<div id="toast"
     class="fixed bottom-24 left-0 right-0 flex justify-center pointer-events-none z-50 hide"
     aria-live="polite" role="status">
    <div class="bg-gray-800 bg-opacity-90 text-white text-sm rounded-lg px-5 py-2.5 max-w-xs text-center shadow-lg">
        <span id="toastMsg"></span>
    </div>
</div>

<script>
    // ---- Toast ----
    var toastTimer = null;

    function showToast(message) {
        var toast = document.getElementById('toast');
        var msg = document.getElementById('toastMsg');

        // Clear any running timer
        if (toastTimer) {
            clearTimeout(toastTimer);
            toastTimer = null;
        }

        msg.textContent = message;
        toast.classList.remove('hide');
        toast.classList.add('show');

        toastTimer = setTimeout(function() {
            toast.classList.remove('show');
            toast.classList.add('hide');
            toastTimer = null;
        }, 2000);
    }
</script>
</body>

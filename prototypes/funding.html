<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>出入金 - 券商交易</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-md mx-auto min-h-screen bg-white">
        <!-- Header -->
        <div class="flex items-center px-4 py-3 border-b border-gray-200">
            <a href="portfolio.html" class="mr-3">
                <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </a>
            <h1 class="text-lg font-semibold">出入金</h1>
        </div>

        <!-- Balance Card -->
        <div class="m-4 bg-gradient-to-br from-blue-600 to-blue-700 rounded-xl p-6 text-white">
            <div class="text-sm opacity-90 mb-1">可用资金</div>
            <div class="text-3xl font-bold">$10,000.00</div>
            <div class="text-sm opacity-75 mt-2">已结算 $10,000.00 | 未结算 $0.00</div>
        </div>

        <!-- Action Buttons -->
        <div class="px-4 mb-6">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="showDeposit()" class="bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-lg">
                    <svg class="w-6 h-6 mx-auto mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    入金
                </button>
                <button onclick="showWithdraw()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-lg">
                    <svg class="w-6 h-6 mx-auto mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/>
                    </svg>
                    出金
                </button>
            </div>
        </div>

        <!-- Bank Cards -->
        <div class="px-4">
            <div class="flex justify-between items-center mb-3">
                <h2 class="font-semibold text-gray-900">银行卡</h2>
                <button class="text-blue-600 text-sm font-medium">+ 添加</button>
            </div>
            <div class="bg-white border border-gray-200 rounded-lg p-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-red-100 rounded-lg flex items-center justify-center mr-3">
                            <svg class="w-6 h-6 text-red-600" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z"/>
                                <path fill-rule="evenodd" d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z"/>
                            </svg>
                        </div>
                        <div>
                            <div class="font-medium">中国银行</div>
                            <div class="text-sm text-gray-500">****1234</div>
                        </div>
                    </div>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Recent Transactions -->
        <div class="px-4 mt-6">
            <h2 class="font-semibold text-gray-900 mb-3">最近记录</h2>
            <div class="space-y-3">
                <div class="bg-white border border-gray-200 rounded-lg p-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-medium">入金</div>
                            <div class="text-sm text-gray-500 mt-1">2026-03-06 14:30</div>
                        </div>
                        <div class="text-right">
                            <div class="font-semibold text-green-600">+$5,000.00</div>
                            <div class="text-xs text-green-600 mt-1">已到账</div>
                        </div>
                    </div>
                </div>
                <div class="bg-white border border-gray-200 rounded-lg p-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-medium">出金</div>
                            <div class="text-sm text-gray-500 mt-1">2026-03-05 10:15</div>
                        </div>
                        <div class="text-right">
                            <div class="font-semibold text-gray-900">-$2,000.00</div>
                            <div class="text-xs text-gray-500 mt-1">已完成</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showDeposit() {
            alert('入金功能\n\n1. 选择银行卡\n2. 输入金额\n3. 确认转账\n4. 资金即时到账');
        }

        function showWithdraw() {
            alert('出金功能\n\n1. 选择银行卡（同名验证）\n2. 输入金额（仅可提取已结算资金）\n3. AML 筛查\n4. 1-3个工作日到账');
        }
    </script>
</body>
</html>

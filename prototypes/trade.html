<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>交易下单 - 券商交易</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .slider-container { position: relative; height: 50px; background: #3B82F6; border-radius: 8px; overflow: hidden; }
        .slider-track { position: absolute; left: 0; top: 0; height: 100%; background: #2563EB; transition: width 0.1s; }
        .slider-button { position: absolute; left: 0; top: 0; width: 60px; height: 50px; background: white; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .slider-text { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: white; font-weight: 600; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-md mx-auto min-h-screen bg-white">
        <!-- Header -->
        <div class="flex items-center px-4 py-3 border-b border-gray-200">
            <a href="stock-detail.html" class="mr-3">
                <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </a>
            <h1 class="text-lg font-semibold" id="pageTitle">买入 AAPL</h1>
        </div>

        <div class="p-4">
            <!-- Current Price -->
            <div class="bg-blue-50 rounded-lg p-4 mb-4">
                <div class="flex justify-between items-center">
                    <span class="text-sm text-gray-600">当前价格</span>
                    <span class="text-xl font-bold text-blue-600" id="currentPrice">$175.23</span>
                </div>
                <div class="flex justify-between items-center mt-2">
                    <span class="text-sm text-gray-600">可用资金</span>
                    <span class="text-lg font-semibold" id="availableFunds">$10,000.00</span>
                </div>
            </div>

            <!-- Order Type Tabs -->
            <div class="flex bg-gray-100 rounded-lg p-1 mb-4">
                <button class="flex-1 py-2 bg-white rounded-md shadow-sm font-medium text-sm">市价单</button>
                <button class="flex-1 py-2 text-gray-600 font-medium text-sm">限价单</button>
                <button class="flex-1 py-2 text-gray-600 font-medium text-sm">止损单</button>
            </div>

            <!-- Price Input -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">限价</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">$</span>
                    <input type="number" value="175.00" step="0.01" class="w-full pl-8 pr-4 py-3 border border-gray-300 rounded-lg text-lg font-semibold focus:outline-none focus:border-blue-500">
                </div>
            </div>

            <!-- Quantity Input -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">数量</label>
                <input type="number" id="quantity" value="100" min="1" class="w-full px-4 py-3 border border-gray-300 rounded-lg text-lg font-semibold focus:outline-none focus:border-blue-500">
                <div class="flex space-x-2 mt-2">
                    <button class="flex-1 py-2 bg-gray-100 rounded-lg text-sm font-medium hover:bg-gray-200" onclick="setQuantity(10)">10</button>
                    <button class="flex-1 py-2 bg-gray-100 rounded-lg text-sm font-medium hover:bg-gray-200" onclick="setQuantity(50)">50</button>
                    <button class="flex-1 py-2 bg-gray-100 rounded-lg text-sm font-medium hover:bg-gray-200" onclick="setQuantity(100)">100</button>
                    <button class="flex-1 py-2 bg-gray-100 rounded-lg text-sm font-medium hover:bg-gray-200" onclick="setQuantity('max')">全部</button>
                </div>
            </div>

            <!-- Cost Summary -->
            <div class="bg-gray-50 rounded-lg p-4 mb-4">
                <div class="flex justify-between text-sm mb-2">
                    <span class="text-gray-600">预估成本</span>
                    <span class="font-semibold" id="estimatedCost">$17,500.00</span>
                </div>
                <div class="flex justify-between text-sm mb-2">
                    <span class="text-gray-600">手续费</span>
                    <span class="font-semibold">$5.00</span>
                </div>
                <div class="flex justify-between pt-2 border-t border-gray-200">
                    <span class="font-medium">合计</span>
                    <span class="font-bold text-lg" id="totalCost">$17,505.00</span>
                </div>
                <div class="flex justify-between text-sm mt-2" id="positionRatio">
                    <span class="text-gray-600">买入后持仓占比</span>
                    <span class="font-semibold text-orange-600">35%</span>
                </div>
            </div>

            <!-- Risk Warning -->
            <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 mb-6" id="riskWarning">
                <div class="flex items-start">
                    <svg class="w-5 h-5 text-yellow-600 mt-0.5 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"/>
                    </svg>
                    <div class="text-sm text-yellow-800">
                        <div class="font-medium mb-1">风险提示</div>
                        <ul class="space-y-1 text-xs" id="warningList">
                            <li id="warningInsufficientFunds" style="display: none;">• 可用资金不足</li>
                            <li id="warningHighRatio" style="display: none;">• 持仓占比过高（建议不超过 20%）</li>
                            <li>• 限价单可能无法成交</li>
                            <li>• 市场波动风险</li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Slide to Confirm -->
            <div class="slider-container" id="sliderContainer">
                <div class="slider-track" id="sliderTrack"></div>
                <div class="slider-button" id="sliderButton">
                    <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </div>
                <div class="slider-text">滑动确认买入 →</div>
            </div>
        </div>
    </div>

    <script>
        const availableFunds = 10000;
        const currentPrice = 175.23;
        const fee = 5.00;
        let lastSubmitTime = 0;

        function setQuantity(qty) {
            const input = document.getElementById('quantity');
            if (qty === 'max') {
                const maxQty = Math.floor((availableFunds - fee) / currentPrice);
                input.value = maxQty;
            } else {
                input.value = qty;
            }
            updateCost();
        }

        function updateCost() {
            const qty = parseInt(document.getElementById('quantity').value) || 0;
            const cost = qty * currentPrice;
            const total = cost + fee;

            document.getElementById('estimatedCost').textContent = `$${cost.toFixed(2)}`;
            document.getElementById('totalCost').textContent = `$${total.toFixed(2)}`;

            // Calculate position ratio (假设当前持仓 $15,340)
            const currentHoldings = 15340;
            const totalAssets = availableFunds + currentHoldings;
            const newHoldings = currentHoldings + cost;
            const ratio = ((newHoldings / (totalAssets + cost)) * 100).toFixed(0);
            document.getElementById('positionRatio').querySelector('span:last-child').textContent = ratio + '%';

            // Risk validation
            validateOrder(total, ratio);
        }

        function validateOrder(total, ratio) {
            const warningInsufficientFunds = document.getElementById('warningInsufficientFunds');
            const warningHighRatio = document.getElementById('warningHighRatio');
            const container = document.getElementById('sliderContainer');

            let hasError = false;

            // Check insufficient funds
            if (total > availableFunds) {
                warningInsufficientFunds.style.display = 'list-item';
                container.style.background = '#9CA3AF';
                container.style.pointerEvents = 'none';
                hasError = true;
            } else {
                warningInsufficientFunds.style.display = 'none';
            }

            // Check high position ratio
            if (ratio > 20) {
                warningHighRatio.style.display = 'list-item';
            } else {
                warningHighRatio.style.display = 'none';
            }

            // Enable/disable slider
            if (!hasError) {
                container.style.background = '#3B82F6';
                container.style.pointerEvents = 'auto';
            }
        }

        // Slider logic
        const container = document.getElementById('sliderContainer');
        const button = document.getElementById('sliderButton');
        const track = document.getElementById('sliderTrack');
        let isDragging = false;
        let startX = 0;
        let currentX = 0;

        button.addEventListener('mousedown', startDrag);
        button.addEventListener('touchstart', startDrag);

        function startDrag(e) {
            isDragging = true;
            startX = e.type === 'mousedown' ? e.clientX : e.touches[0].clientX;
            document.addEventListener('mousemove', drag);
            document.addEventListener('touchmove', drag);
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchend', endDrag);
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            const clientX = e.type === 'mousemove' ? e.clientX : e.touches[0].clientX;
            currentX = Math.max(0, Math.min(clientX - startX, container.offsetWidth - 60));
            button.style.left = currentX + 'px';
            track.style.width = currentX + 'px';

            if (currentX >= container.offsetWidth - 60) {
                confirmOrder();
            }
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            if (currentX < container.offsetWidth - 60) {
                button.style.left = '0px';
                track.style.width = '0px';
                currentX = 0;
            }
            document.removeEventListener('mousemove', drag);
            document.removeEventListener('touchmove', drag);
            document.removeEventListener('mouseup', endDrag);
            document.removeEventListener('touchend', endDrag);
        }

        function confirmOrder() {
            // Prevent double submit (2 seconds debounce)
            const now = Date.now();
            if (now - lastSubmitTime < 2000) {
                return;
            }
            lastSubmitTime = now;

            alert('订单提交成功！\n\n正在进行生物识别验证...');
            setTimeout(() => {
                window.location.href = 'orders.html';
            }, 500);
        }

        document.getElementById('quantity').addEventListener('input', updateCost);
        updateCost(); // Initial calculation
    </script>
</body>
</html>
